spring:
  mvc:
    problemdetails:
      enabled: true

  mongodb:
    host: localhost
    port: 27017
    database: eca

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

server:
  port: 0

eureka:
  instance:
    instanceId: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${random.value}}}